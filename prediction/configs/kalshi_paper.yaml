name: kalshi_revenue_surprise_paper_v1
seed: 2026
output_dir: prediction/outputs/kalshi_paper

run:
  concurrency: 48              # transport-only: avoids gateway connection storms; no prompt change
  reps: 3                    # manuscript protocol: three independent calls per arm and target
  limit: 0
  strong_only: true
  drop_outlier_pct: 0
  render_only: false
  cutoff: 2025-12-01
  n_calls: 2
  hist_rows: 6
  max_transcript_chars: 48000
  prompt_protocol: paper      # Y-specific system/timeline wording shown in the manuscript appendix

llm: {model: gpt-5.5-2026-04-23, effort: medium, max_retries: 6}

data:
  panel_out: prediction/outputs/kalshi_paper/panels
  screen_csv: kalshi/data/ticker_screen.csv
  sentiment_json: lm_sentiment.json

grid:
  channels: [kalshi]
  targets:  [surprise_early, surprise_print, rev_yoy]
  variants: [BASE, TOOL]
  arms:
    - {name: fin,        blocks: [fin]}
    - {name: fin+x,      blocks: [fin, x]}
    - {name: fin+text,   blocks: [fin, text]}
    - {name: fin+x+text, blocks: [fin, x, text]}
  baselines: [N0, N1, N2, N3, N4, N3b, N4b, N5]

evaluate: {headline_arm: fin+x+text, synergy_arms: [fin, fin+x, fin+text, fin+x+text],
           bootstrap: 5000, surrogate_n: 5000, calib_folds: 5}
