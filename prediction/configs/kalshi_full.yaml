name: kalshi_full
seed: 2026
output_dir: prediction/outputs/kalshi_full

run:
  concurrency: 8
  reps: 3                    # paper's synergy protocol: 3 repeats (single-run is a false negative)
  limit: 0                   # all firm-screened targets
  strong_only: false         # main result uses every O firm; strong_only is a separate robustness run
  drop_outlier_pct: 0
  render_only: false
  cutoff: 2025-12-01
  n_calls: 2
  hist_rows: 6
  max_transcript_chars: 48000

llm: {model: gpt-5.5-2026-04-23, effort: medium, max_retries: 6}

data:
  panel_out: prediction/outputs/kalshi_full/panels
  screen_csv: factor1/data/altdata_ticker_screen.csv
  sentiment_json: lm_sentiment.json

grid:
  channels: [kalshi]
  targets:  [surprise_early]  # rev_yoy dropped: only n=1 target qualifies (needs prior-year actual) → unusable
  variants: [BASE]           # TOOL blocked: gpt-5.5 rejects function tools + reasoning_effort on
                             # /v1/chat/completions (needs /v1/responses migration — pipeline-wide, all channels)
  arms:
    - {name: fin,        blocks: [fin]}
    - {name: fin+x,      blocks: [fin, x]}
    - {name: fin+text,   blocks: [fin, text]}
    - {name: fin+x+text, blocks: [fin, x, text]}
  baselines: [N0, N1, N2, N3, N4, N3b, N4b, N5]

evaluate: {headline_arm: fin+x+text, synergy_arms: [fin, fin+x, fin+text, fin+x+text],
           bootstrap: 5000, surrogate_n: 5000, calib_folds: 5}
