name: kalshi_smoke_tool
seed: 2026
output_dir: prediction/outputs/kalshi_smoke_tool
run:
  concurrency: 6
  reps: 1
  limit: 2                  # 2 targets — smoke the BASE + TOOL path end to end
  strong_only: false
  drop_outlier_pct: 0
  render_only: false
  cutoff: 2025-12-01
  n_calls: 2
  hist_rows: 6
  max_transcript_chars: 48000
llm: {model: gpt-5.5-2026-04-23, effort: medium, max_retries: 4}
data:
  panel_out: prediction/outputs/kalshi_smoke_tool/panels
  screen_csv: factor1/data/altdata_ticker_screen.csv
  sentiment_json: lm_sentiment.json
grid:
  channels: [kalshi]
  targets:  [surprise_early]
  variants: [BASE, TOOL]
  arms:
    - {name: fin,        blocks: [fin]}
    - {name: fin+x,      blocks: [fin, x]}
    - {name: fin+text,   blocks: [fin, text]}
    - {name: fin+x+text, blocks: [fin, x, text]}
  baselines: [N0, N1, N2, N3, N4, N3b, N4b, N5]
evaluate: {headline_arm: fin+x+text, synergy_arms: [fin, fin+x, fin+text, fin+x+text],
           bootstrap: 2000, surrogate_n: 2000, calib_folds: 5}
