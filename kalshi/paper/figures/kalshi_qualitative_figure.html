<!doctype html><html><head><meta charset="utf-8"><title>Kalshi qualitative examples</title>
<style>html,body{margin:0;background:#fff}.qfig{--ink:#1c1b19;--muted:#736c60;--blue:#29b9f2;
--tint:#dcf1fb;--gray:#737373;max-width:1058px;margin:8px auto;padding:6px 21px;font-family:"DejaVu Serif",
Georgia,"Times New Roman",serif;color:var(--ink);line-height:1.45}.qfig *{box-sizing:border-box}.case{display:flex;
gap:19px;align-items:stretch;padding:8px 0;border-top:1px solid var(--gray)}.case:last-child{border-bottom:1px solid var(--gray)}
.tbl{flex:0 0 330px;min-width:0}.co{margin:0;font-size:15px;font-weight:700}.meta{font-size:11px;
letter-spacing:.05em;text-transform:uppercase;margin:0 0 7px}.qfig table{width:100%;border-collapse:collapse;
font-variant-numeric:tabular-nums}.qfig td{padding:3px 2px;vertical-align:baseline}.k{color:var(--muted);
font-size:13px;padding-right:8px}.v{text-align:right;white-space:nowrap;font-size:14px}.pct{color:var(--muted);
font-size:11px;margin-left:5px}.est td{border-top:1px solid var(--gray);padding-top:6px}.est .k{color:var(--ink)}
.est .v,.est .pct{color:var(--blue);font-weight:700}.noalt td{color:var(--muted);font-size:11px}.noalt .k{padding-left:12px}
.sig td{padding-top:6px}.sig .v{font-weight:700}.v.small{white-space:normal;font-size:11px;line-height:1.25}
.rat{flex:1;border:1px solid var(--gray);padding:8px 14px}.ratlab{font-size:11px;letter-spacing:.11em;
text-transform:uppercase;margin:0 0 5px}.rat p:last-child{margin:0;font-size:13px;line-height:1.5}mark{background:var(--tint);
color:var(--ink);padding:1px 2px}@media(max-width:720px){.case{flex-direction:column}.tbl{flex-basis:auto}}</style>
</head><body><figure class="qfig"><div class="case"><div class="tbl">
<p class="co">TSLA</p>
<p class="meta">Kalshi KPI - early consensus - representative seed 2028</p>
<table>
<tr><td class="k">Actual revenue</td><td class="v">$22,387M<span class="pct">&minus;1.3%</span></td></tr>
<tr><td class="k">Consensus (early)</td><td class="v">$22,691M</td></tr>
<tr><td class="k">Prior-year revenue</td><td class="v">$19,335M</td></tr>
<tr class="est"><td class="k">Model estimate</td><td class="v">$22,420M<span class="pct">&minus;1.2%</span></td></tr>
<tr class="noalt"><td class="k">without Kalshi X</td><td class="v">$23,050M<span class="pct">+1.6%</span></td></tr>
<tr class="sig"><td class="k">Kalshi ladder</td><td class="v small">290000 or more: 100%; 300000 or more: 100%</td></tr>
</table></div><div class="rat"><p class="ratlab">Model rationale</p>
<p><mark>Kalshi delivery ladder is very tight: Q1 deliveries are almost certainly between 350k and 360k, materially below Q4 2025 and only modestly above weak Q1 2025.</mark> That level supports a sequential decline in automotive revenue, while strong Energy backlog/deployments and Services should partially offset. The consensus of $22.691B appears achievable but somewhat high relative to the implied delivery volume and Q1 seasonality, so I expect a small revenue miss rather than a repeat of the large Q1 2025 shortfall.</p></div></div>
<div class="case"><div class="tbl">
<p class="co">COIN</p>
<p class="meta">Kalshi KPI - latest consensus - representative seed 2027</p>
<table>
<tr><td class="k">Actual revenue</td><td class="v">$1,413M<span class="pct">&minus;4.9%</span></td></tr>
<tr><td class="k">Consensus (latest)</td><td class="v">$1,485M</td></tr>
<tr><td class="k">Prior-year revenue</td><td class="v">$2,034M</td></tr>
<tr class="est"><td class="k">Model estimate</td><td class="v">$1,500M<span class="pct">+1.0%</span></td></tr>
<tr class="noalt"><td class="k">without Kalshi X</td><td class="v">$1,510M<span class="pct">+1.6%</span></td></tr>
<tr class="sig"><td class="k">Kalshi ladder</td><td class="v small">Above $200 billion: 72%; Above $205 billion: 36%</td></tr>
</table></div><div class="rat"><p class="ratlab">Model rationale</p>
<p><mark>Kalshi&#x27;s pre-publication trading-volume ladder is centered just above $200B for Q1, below recent comparable quarters such as Q2/Q3 2025, pointing to softer spot-driven transaction revenue.</mark> Coinbase had $420M of transaction revenue through Feb. 10, but that likely reflected early-quarter volatility and should not be fully straight-line extrapolated. <mark>I estimate transaction revenue around $850M, subscription/services near the midpoint of guidance at roughly $590M, and other revenue around $60M, yielding total revenue near $1.50B, modestly below the $1.581B consensus.</mark></p></div></div></figure></body></html>
